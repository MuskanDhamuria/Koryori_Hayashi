services:
  postgres:
    image: postgres:16-alpine
    container_name: koryori-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: koryori_hayashi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: koryori-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"

volumes:
  postgres-data:
