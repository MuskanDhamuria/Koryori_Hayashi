<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sushi Catch!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Inter:wght@300;700&display=swap');

        :root {
            --primary: #3498db;
            --accent: #f1c40f;
            --danger: #e74c3c;
            --bg-dark: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        /* Ambient Glow Background */
        #game-container::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(52, 152, 219, 0.05) 0%, transparent 50%);
            animation: rotateGlow 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            right: 20px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 2px;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 40px;
            text-align: center;
        }

        .title {
            
            font-size: 64px;
            line-height: 1;
            background: linear-gradient(to bottom, #fff, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(52, 152, 219, 0.5));
            margin-bottom: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 18px 48px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.4);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .hidden { display: none !important; }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-overlay">
        <div class="score-box">
            <span class="score-label">Sushi</span>
            <span id="score" style="color: var(--accent);">0</span>
        </div>
        <div class="score-box">
            <span class="score-label">Record</span>
            <span id="high-score" style="color: var(--primary);">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen">
        <h1 class="title">Sushi Catch!</h1>
        <p class="text-slate-400 mb-10 font-medium">Catch the rolls, avoid the charges.</p>
        
        <div class="stat-card mb-10 flex justify-around items-center">
            <div class="flex flex-col items-center">
                <div class="text-4xl mb-2">🍣</div>
                <span class="text-xs font-bold text-emerald-400">+100 pts</span>
            </div>
            <div class="w-px h-12 bg-white/10"></div>
            <div class="flex flex-col items-center">
                <div class="text-4xl mb-2">💣</div>
                <span class="text-xs font-bold text-rose-500">Game Over</span>
            </div>
        </div>

        <button class="btn" onclick="startGame()">Start Serving</button>
        <p class="mt-8 text-slate-500 text-xs uppercase letter-spacing-wide">Use Arrows or Tap Sides</p>
    </div>

    <div id="game-over-screen" class="hidden">
        <div class="text-rose-500 text-sm font-bold uppercase tracking-widest mb-2">Fatal Collision</div>
        <h1 class="title" > GAME OVER!</h1>
        
        <div class="my-10">
            <div class="text-slate-400 text-xs uppercase mb-1">Total Score</div>
            <div id="final-score" class="text-5xl font-bold">0</div>
        </div>

        <button class="btn" onclick="startGame()">Try Again</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const finalScoreEl = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');

    let gameActive = false;
    let score = 0;
    let highScore = localStorage.getItem('plateDashHighScore') || 0;
    highScoreEl.innerText = highScore;

    const LANES = 3;
    let laneWidth;
    let gameSpeed = 5;
    const initialSpeed = 5;
    const speedIncr = 0.0018;

    const player = {
        lane: 1,
        x: 0,
        y: 0,
        width: 100,
        height: 40,
        targetX: 0,
        lerpSpeed: 0.2
    };

    let items = [];
    let backgroundLines = [];
    let frameCount = 0;

    function resize() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        laneWidth = canvas.width / LANES;
        player.width = laneWidth * 0.75;
        player.height = player.width * 0.35;
        player.y = canvas.height - player.height - 100;
        updatePlayerTarget();
        player.x = player.targetX;
    }

    function updatePlayerTarget() {
        player.targetX = (player.lane * laneWidth) + (laneWidth / 2) - (player.width / 2);
    }

    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer(-1);
        if (e.key === 'ArrowRight' || e.key === 'd') movePlayer(1);
    });

    canvas.addEventListener('touchstart', (e) => {
        if (!gameActive) return;
        const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
        if (touchX < canvas.width / 2) movePlayer(-1);
        else movePlayer(1);
        e.preventDefault();
    }, { passive: false });

    function movePlayer(dir) {
        player.lane = Math.max(0, Math.min(LANES - 1, player.lane + dir));
        updatePlayerTarget();
    }

    function spawnItem() {
        const type = Math.random() > 0.4 ? 'sushi' : 'bomb';
        const lane = Math.floor(Math.random() * LANES);
        
        const lastInLane = items.filter(i => i.lane === lane).pop();
        if (lastInLane && lastInLane.y < 250) return;

        items.push({
            type,
            lane,
            x: (lane * laneWidth) + (laneWidth / 2),
            y: -100,
            size: laneWidth * 0.38,
            rotation: Math.random() * Math.PI * 2,
            pulse: 0
        });
    }

    function drawPlayer() {
        player.x += (player.targetX - player.x) * player.lerpSpeed;

        ctx.save();
        ctx.translate(player.x + player.width/2, player.y + player.height/2);
        
        // Dynamic lean effect based on movement
        const lean = (player.targetX - player.x) * 0.05;
        ctx.rotate(lean);

        // Ground shadow (follows rotation for depth)
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(0, 25, player.width/2, player.height/4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Main Plate Body
        const plateGrad = ctx.createLinearGradient(0, -player.height/2, 0, player.height/2);
        plateGrad.addColorStop(0, '#ffffff');
        plateGrad.addColorStop(0.5, '#f8fafc');
        plateGrad.addColorStop(1, '#e2e8f0');
        
        ctx.fillStyle = plateGrad;
        ctx.beginPath();
        ctx.ellipse(0, 0, player.width/2, player.height/2, 0, 0, Math.PI * 2);
        ctx.fill();

        // Accent Rim
        ctx.strokeStyle = '#3498db';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(0, 0, player.width/2.2, player.height/2.2, 0, 0, Math.PI * 2);
        ctx.stroke();

        // High gloss highlight
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        ctx.ellipse(-player.width/6, -player.height/6, player.width/8, player.height/12, Math.PI/4, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function drawItem(item) {
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.rotate(item.rotation);

        if (item.type === 'sushi') {
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(0, item.size/3, item.size/2, item.size/4, 0, 0, Math.PI * 2);
            ctx.fill();

            // Rice Base
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(-item.size/2, -item.size/3, item.size, item.size/1.5, 10);
            ctx.fill();

            // Salmon Topping
            const fishGrad = ctx.createLinearGradient(-item.size/2, 0, item.size/2, 0);
            fishGrad.addColorStop(0, '#ff7f50');
            fishGrad.addColorStop(0.5, '#ff8f6a');
            fishGrad.addColorStop(1, '#ff7f50');
            ctx.fillStyle = fishGrad;
            ctx.beginPath();
            ctx.roundRect(-item.size/2, -item.size/3, item.size, item.size/2.5, 6);
            ctx.fill();

            // Fat Lines
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            for(let i=-2; i<=2; i++){
                ctx.beginPath();
                ctx.moveTo(i * (item.size/6), -item.size/3);
                ctx.lineTo(i * (item.size/6) + 5, -item.size/15);
                ctx.stroke();
            }

            // Nori
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(-item.size/8, -item.size/3, item.size/4, item.size/1.5);
        } else {
            // Bomb Body
            const bombGrad = ctx.createRadialGradient(-5, -5, 0, 0, 0, item.size/2);
            bombGrad.addColorStop(0, '#475569');
            bombGrad.addColorStop(1, '#020617');
            ctx.fillStyle = bombGrad;
            ctx.beginPath();
            ctx.arc(0, 0, item.size/2, 0, Math.PI * 2);
            ctx.fill();
            
            // Bomb Rim Highlight
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath();
            ctx.arc(0, 0, item.size/2.2, 0, Math.PI * 2);
            ctx.stroke();

            // Wick
            item.pulse += 0.25;
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, -item.size/2);
            ctx.quadraticCurveTo(15, -item.size/1.2, 8, -item.size);
            ctx.stroke();

            // Animated Spark
            const sparkSize = 6 + Math.sin(item.pulse) * 3;
            ctx.fillStyle = '#f59e0b';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fbbf24';
            ctx.beginPath();
            ctx.arc(8, -item.size, sparkSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Danger Glow
            ctx.fillStyle = `rgba(239, 68, 68, ${0.1 + Math.sin(item.pulse) * 0.05})`;
            ctx.beginPath();
            ctx.arc(0, 0, item.size/1.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    function update() {
        if (!gameActive) return;
        frameCount++;
        gameSpeed += speedIncr;

        // Visual background speed lines
        if (frameCount % 4 === 0) {
            backgroundLines.push({
                x: Math.random() * canvas.width,
                y: -100,
                length: 40 + Math.random() * 60,
                speed: 1.5 + Math.random() * 1.5,
                opacity: 0.05 + Math.random() * 0.1
            });
        }

        backgroundLines.forEach((line, index) => {
            line.y += gameSpeed * line.speed;
            if (line.y > canvas.height + 100) backgroundLines.splice(index, 1);
        });

        if (Math.random() < 0.038) spawnItem();

        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            item.y += gameSpeed;
            if (item.type === 'bomb') item.rotation += 0.04;

            const hitX = Math.abs((player.x + player.width/2) - item.x);
            const hitY = Math.abs((player.y + player.height/3) - item.y);

            if (hitX < (player.width/2 + item.size/3) && hitY < (player.height/2 + item.size/3)) {
                if (item.type === 'sushi') {
                    score += 100;
                    scoreEl.innerText = score;
                    items.splice(i, 1);
                } else {
                    endGame();
                }
                continue;
            }

            if (item.y > canvas.height + 150) {
                items.splice(i, 1);
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Lane markers
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 4;
        for (let i = 1; i < LANES; i++) {
            ctx.setLineDash([30, 40]);
            ctx.beginPath();
            ctx.moveTo(i * laneWidth, 0);
            ctx.lineTo(i * laneWidth, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Speed Lines
        backgroundLines.forEach(line => {
            ctx.strokeStyle = `rgba(255, 255, 255, ${line.opacity})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(line.x, line.y);
            ctx.lineTo(line.x, line.y + line.length);
            ctx.stroke();
        });

        items.forEach(drawItem);
        drawPlayer();

        if (gameActive) {
            requestAnimationFrame(() => {
                update();
                draw();
            });
        }
    }

    function startGame() {
        score = 0;
        gameSpeed = initialSpeed;
        items = [];
        backgroundLines = [];
        player.lane = 1;
        updatePlayerTarget();
        player.x = player.targetX;
        scoreEl.innerText = "0";
        
        gameActive = true;
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        draw();
    }

    function notifyParentGameOver() {
        if (window.parent === window) return;
        window.parent.postMessage({
            type: 'PLATE_DASH_GAME_OVER',
            score
        }, window.location.origin);
    }

    function endGame() {
        gameActive = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('plateDashHighScore', highScore);
            highScoreEl.innerText = highScore;
        }
        finalScoreEl.innerText = score;
        notifyParentGameOver();
        gameOverScreen.classList.remove('hidden');
    }

    window.addEventListener('resize', resize);
    resize();
</script>

</body>
</html>
